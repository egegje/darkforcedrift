<!doctype html>
<html lang="ru" data-variant="paddock">
<head>
<meta charset="utf-8">
<title>Inner Circle — Paddock — drift.eg.je</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css?v=brand3">
<link rel="stylesheet" href="paddock.css">
<link rel="stylesheet" href="../mobile-overrides.css?v=mobile5">
<style>
  .ic-lede {
    font-family: var(--font-display, 'Oswald', sans-serif);
    font-size:clamp(28px, 4vw, 44px); line-height:0.95; letter-spacing:0.01em;
    text-transform:uppercase; color:#fff; max-width:24ch; margin-top:18px;
  }
  .ic-lede em { color: var(--accent); font-style:normal; }
  .ic-sub {
    color: rgba(255,255,255,0.78); font-size:15px; line-height:1.6; max-width:60ch;
    margin-top:14px;
  }

  .ic-tiers { display:grid; grid-template-columns:1fr; gap:20px; margin-top:32px; }
  @media (min-width: 700px) { .ic-tiers { grid-template-columns: repeat(3, 1fr); } }

  .ic-tier {
    background:#0f0f10; border:1px solid #2a2a2c;
    display:flex; flex-direction:column; position:relative; overflow:hidden;
  }
  .ic-tier--featured { border-color: var(--accent); }
  .ic-tier--featured::before {
    content:'CHOICE'; position:absolute; top:0; right:0;
    background: var(--accent); color: var(--accent-ink);
    padding:5px 10px; font-family:'JetBrains Mono', monospace;
    font-size:10px; letter-spacing:0.18em; font-weight:700;
  }
  .ic-tier__head {
    padding:18px 22px 14px; border-bottom:1px dashed #2a2a2c;
    display:flex; flex-direction:column; gap:6px;
  }
  .ic-tier__name {
    font-family: var(--font-display, 'Oswald', sans-serif);
    font-size:22px; letter-spacing:0.04em; text-transform:uppercase; color:#fff;
  }
  .ic-tier__sub {
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.18em;
    color: rgba(255,255,255,0.55); text-transform:uppercase;
  }
  .ic-tier__price {
    padding:14px 22px; display:flex; align-items:baseline; gap:8px;
    border-bottom:1px solid #2a2a2c;
  }
  .ic-tier__price strong {
    font-family:'Bebas Neue', sans-serif; font-size:42px; line-height:1; color:#fff;
    letter-spacing:0.02em;
  }
  .ic-tier__price span {
    font-family:'JetBrains Mono', monospace; font-size:11px;
    color: rgba(255,255,255,0.55); letter-spacing:0.18em;
  }
  .ic-tier__save {
    padding:10px 22px;
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.14em;
    color: var(--accent); text-transform:uppercase;
    border-bottom:1px dashed #2a2a2c;
  }
  .ic-tier__save--neutral { color: rgba(255,255,255,0.55); }
  .ic-tier__copy {
    padding:14px 22px 16px; flex:1;
    color: rgba(255,255,255,0.78); font-size:13px; line-height:1.55;
  }
  .ic-tier__cta { padding:16px 22px; border-top:1px solid #2a2a2c; }

  .ic-inside {
    margin-top:42px; background:#0f0f10; border:1px solid #2a2a2c; padding:24px;
  }
  .ic-inside__head {
    display:flex; align-items:baseline; justify-content:space-between;
    gap:12px; flex-wrap:wrap; margin-bottom:18px;
  }
  .ic-inside__title {
    font-family: var(--font-display, 'Oswald', sans-serif);
    font-size:24px; letter-spacing:0.02em; text-transform:uppercase; color:#fff; margin:0;
  }
  .ic-inside__meta {
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.18em;
    color: rgba(255,255,255,0.55); text-transform:uppercase;
  }
  .ic-inside__list {
    list-style:none; margin:0; padding:0;
    display:grid; grid-template-columns:1fr; gap:12px;
  }
  @media (min-width: 700px) { .ic-inside__list { grid-template-columns: repeat(2, 1fr); } }
  .ic-inside__list li {
    display:grid; grid-template-columns: 14px 1fr; gap:12px;
    color: rgba(255,255,255,0.85); font-size:14px; line-height:1.5;
  }
  .ic-inside__list li::before {
    content:''; display:block; width:10px; height:10px;
    background: var(--accent); margin-top:6px;
  }
</style>
</head>
<body class="pad-body">

<div class="pad-strip"></div>

<header class="topbar">
  <div class="topbar__inner">
    <a class="brand brand--stack" href="../index.html" aria-label="Dark Force">
      <svg class="monster-head" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M4 4 L14 10 L24 4 L22 16 L26 22 L14 26 L2 22 L6 16 Z" fill="var(--accent)" stroke="none"/>
      </svg>
      <span class="brand__wordmark">DARK <b>FORCE</b></span>
    </a>
    <nav class="nav">
      <a href="home.html">Home</a>
      <a href="team.html">Team</a>
      <a href="drivers.html">Drivers</a>
      <a href="calendar.html">Calendar</a>
      <a href="tracks.html">Tracks</a>
      <a href="gallery.html">Gallery</a>
      <a href="shop.html">Shop</a>
      <a href="merch.html">Merch</a>
      <a href="sponsors.html">Sponsors</a>
      <a href="coaching.html">Coaching</a>
      <a href="tickets.html" class="soon" title="Раздел временно неактивен — вернёмся позже">Tickets</a>
      <a href="prints.html">Prints</a>
      <a class="active" href="inner-circle.html">Inner</a>
      <a href="courses.html">Courses</a>
    </nav>
    <div class="topbar__right">
      <a class="btn btn--primary" href="#ic-tiers">Подписаться</a>
    </div>
  </div>
</header>

<section class="pad-section">
  <div class="pad-section__head">
    <span class="num">14</span>
    <h2>Inner Circle</h2>
    <span class="meta">PRIVATE TG<br>CHANNEL</span>
  </div>

  <h1 class="ic-lede" id="ic-lede"></h1>
  <p class="ic-sub" id="ic-sub"></p>

  <div class="ic-tiers" id="ic-tiers"></div>

  <div class="ic-inside">
    <div class="ic-inside__head">
      <h2 class="ic-inside__title">Что внутри?</h2>
      <span class="ic-inside__meta">Только для подписчиков</span>
    </div>
    <ul class="ic-inside__list" id="ic-perks"></ul>
  </div>

</section>

<footer class="pad-footer">
  <div class="pad-footer__mono">
    <span>© 2026 DRIFT.EG.JE</span>
    <span>Paddock variant · inner circle</span>
  </div>
</footer>

<script>
window.DRIFT_TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "orange",
  "density": "comfy",
  "motion": true,
  "hero": "video",
  "lang": "ru"
}/*EDITMODE-END*/;
</script>
<script src="../drift-data.js"></script>
<script src="../shared.js"></script>
<script>
(function () {
  function esc(s) { return String(s == null ? '' : s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])); }
  function enc(s) { return encodeURIComponent(String(s == null ? '' : s)); }
  var data = window.DRIFT_DATA || {};
  var IC = data.innerCircle || {};
  var email = IC.contactEmail || 'darkforcedrift@gmail.com';

  var ledeEl = document.getElementById('ic-lede');
  if (ledeEl) {
    var parts = [];
    if (IC.lede) parts.push(esc(IC.lede));
    if (IC.lede2) parts.push(esc(IC.lede2));
    if (IC.ledeAccent) parts.push('<em>' + esc(IC.ledeAccent) + '</em>');
    ledeEl.innerHTML = parts.join('<br>');
  }
  var subEl = document.getElementById('ic-sub');
  if (subEl) subEl.textContent = IC.sub || '';

  var tiersEl = document.getElementById('ic-tiers');
  if (tiersEl) {
    tiersEl.innerHTML = (IC.tiers || []).map(function (t) {
      var subj = enc('Inner Circle · ' + (t.name || ''));
      var body = enc('Хочу подписку Inner Circle ' + (t.name || '') + ' (' + (t.price || '') + (t.period || '') + ').\nИмя: \nTelegram: ');
      var saveCls = 'ic-tier__save' + (t.saveNeutral ? ' ic-tier__save--neutral' : '');
      return '<div class="ic-tier' + (t.featured ? ' ic-tier--featured' : '') + '">' +
        '<div class="ic-tier__head">' +
          '<div class="ic-tier__name">' + esc(t.name || '') + '</div>' +
          (t.sub ? '<div class="ic-tier__sub">' + esc(t.sub) + '</div>' : '') +
        '</div>' +
        '<div class="ic-tier__price"><strong>' + esc(t.price || '') + '</strong><span>' + esc(t.period || '') + '</span></div>' +
        (t.save ? '<div class="' + saveCls + '">' + esc(t.save) + '</div>' : '') +
        '<div class="ic-tier__copy">' + esc(t.copy || '') + '</div>' +
        '<div class="ic-tier__cta">' +
          '<a class="btn ' + (t.featured ? 'btn--primary' : 'btn--secondary') + '" href="mailto:' + esc(email) + '?subject=' + subj + '&body=' + body + '" style="display:block;text-align:center">Подписаться →</a>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  var perksEl = document.getElementById('ic-perks');
  if (perksEl) {
    perksEl.innerHTML = (IC.perks || []).map(function (p) {
      return '<li>' + esc(p) + '</li>';
    }).join('');
  }
})();
</script>
</body>
</html>
