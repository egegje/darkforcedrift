<style>
  /* Merch grid — variable card sizes, asymmetric paddock spread */
  .merch-grid { display:grid; grid-template-columns:repeat(12, 1fr); gap:24px; margin-top:24px; }
  .merch-card { grid-column: span 12; background:#0f0f10; border:1px solid #2a2a2c; padding:0; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .merch-card--feature { grid-column: span 12; }
  @media (min-width: 900px) {
    .merch-card--feature { grid-column: span 12; }
    .merch-card { grid-column: span 6; }
  }
  .merch-card__shots { display:grid; grid-template-columns:1fr 1fr; gap:0; background:#0d0d0d; }
  .merch-card__shot { position:relative; aspect-ratio: 1/1; overflow:hidden; }
  .merch-card__shot img { width:100%; height:100%; object-fit:contain; display:block; }
  .merch-card__tape {
    position:absolute; top:14px; left:14px;
    font-family: 'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.18em;
    background: var(--accent); color: var(--accent-ink);
    padding:4px 8px; text-transform:uppercase;
  }
  .merch-card__view-tag {
    position:absolute; bottom:14px; left:14px;
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.18em;
    color: rgba(255,255,255,0.55); text-transform:uppercase;
  }
  .merch-card__body { padding:24px 26px 26px; display:flex; flex-direction:column; gap:14px; }
  .merch-card__name {
    font-family: var(--font-display, 'Oswald', sans-serif);
    font-size:clamp(28px, 4vw, 44px); line-height:0.95; letter-spacing:0.01em;
    text-transform:uppercase; color:#fff;
  }
  .merch-card__sub {
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.18em;
    color: rgba(255,255,255,0.55); text-transform:uppercase;
  }
  .merch-card__copy { color: rgba(255,255,255,0.78); font-size:14px; line-height:1.55; max-width:60ch; }
  .merch-card__meta {
    display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:14px 28px;
    border-top:1px dashed #2a2a2c; padding-top:14px; margin-top:6px;
  }
  .merch-card__meta dt {
    font-family:'JetBrains Mono', monospace; font-size:9px; letter-spacing:0.22em;
    color: rgba(255,255,255,0.45); text-transform:uppercase; margin-bottom:4px;
  }
  .merch-card__meta dd { color:#fff; font-weight:600; font-size:14px; margin:0; }
  .merch-card__foot { display:flex; justify-content:space-between; align-items:flex-end; gap:18px; flex-wrap:wrap; margin-top:6px; }
  .merch-card__price {
    font-family:'Bebas Neue', sans-serif; font-size:42px; line-height:1;
    color:#fff; letter-spacing:0.02em;
  }
  .merch-card__price small {
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.18em;
    color: rgba(255,255,255,0.55); margin-left:8px; vertical-align: 6px;
  }

  /* Soon-tile — placeholder slots for future drops */
  .merch-soon {
    grid-column: span 12;
    aspect-ratio: 4/5; min-height:280px;
    border:1px dashed rgba(255,255,255,0.18);
    background: repeating-linear-gradient(
      45deg,
      transparent 0 14px,
      rgba(255,255,255,0.03) 14px 28px
    );
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; color: rgba(255,255,255,0.55);
  }
  @media (min-width: 700px) {
    .merch-soon { grid-column: span 4; }
  }
  .merch-soon__title {
    font-family: var(--font-display, 'Oswald', sans-serif); font-size:24px; letter-spacing:0.04em;
    text-transform:uppercase; color: rgba(255,255,255,0.7);
  }
  .merch-soon__hint {
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.22em;
    text-transform:uppercase;
  }
</style>
</head>

<script>
window.DRIFT_TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "orange",
  "density": "comfy",
  "motion": true,
  "hero": "video",
  "lang": "ru"
}/*EDITMODE-END*/;

<script src="../drift-data.js"></script>
<script src="../shared.js"></script>
<script>
(function () {
  function esc(s) { return String(s == null ? '' : s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])); }
  var data = window.DRIFT_DATA || {};
  var M = (data.merch && data.merch.dropOne) || null;
  var host = document.getElementById('merch-grid');
  if (!host) return;
  if (!M) {
    M = {
      sub: 'DROP 01 · OVERSIZE TEE', name: 'Dark Force Hannya Tee',
      copy: 'Plotted on heavyweight 240 g/m² oversize cotton.',
      fabric: '240 g/m² combed cotton', cut: 'Oversize', print: 'Plotter vinyl', sizes: 'S — XXL', drop: '01',
      price: '3 900 ₽', priceUnit: '/ each',
      telegramUrl: 'https://t.me/darkforcedrift', telegramLabel: 'Reserve via Telegram →',
      soonTiles: [{title:'Caps',hint:'DROP 02 · COMING'},{title:'Patches',hint:'DROP 02 · COMING'},{title:'Stickers',hint:'DROP 02 · COMING'}]
    };
  }
  var card =
    '<article class="merch-card merch-card--feature">' +
      '<div class="merch-card__shots">' +
        '<div class="merch-card__shot">' +
          '<span class="merch-card__tape">DROP 01</span>' +
          '<img src="merch/tshirt-front.jpg" alt="Dark Force tee — front">' +
          '<span class="merch-card__view-tag">FRONT · UNLEASH YOUR DEMONS</span>' +
        '</div>' +
        '<div class="merch-card__shot">' +
          '<img src="merch/tshirt-back.jpg" alt="Dark Force tee — back">' +
          '<span class="merch-card__view-tag">BACK · HANNYA / DRIFT TEAM</span>' +
        '</div>' +
      '</div>' +
      '<div class="merch-card__body">' +
        '<div class="merch-card__sub">' + esc(M.sub || '') + '</div>' +
        '<div class="merch-card__name">' + esc(M.name || '') + '</div>' +
        '<p class="merch-card__copy">' + esc(M.copy || '') + '</p>' +
        '<dl class="merch-card__meta">' +
          (M.fabric ? '<div><dt>Fabric</dt><dd>' + esc(M.fabric) + '</dd></div>' : '') +
          (M.cut ? '<div><dt>Cut</dt><dd>' + esc(M.cut) + '</dd></div>' : '') +
          (M.print ? '<div><dt>Print</dt><dd>' + esc(M.print) + '</dd></div>' : '') +
          (M.sizes ? '<div><dt>Sizes</dt><dd>' + esc(M.sizes) + '</dd></div>' : '') +
          (M.drop ? '<div><dt>Drop</dt><dd>' + esc(M.drop) + '</dd></div>' : '') +
        '</dl>' +
        '<div class="merch-card__foot">' +
          '<div class="merch-card__price">' + esc(M.price || '') + (M.priceUnit ? '<small>' + esc(M.priceUnit) + '</small>' : '') + '</div>' +
          '<a class="btn btn--primary" href="' + esc(M.telegramUrl || '#') + '" target="_blank" rel="noopener">' + esc(M.telegramLabel || 'Reserve →') + '</a>' +
        '</div>' +
      '</div>' +
    '</article>';
  var soon = (M.soonTiles || []).map(function (t) {
    return '<div class="merch-soon">' +
      '<div class="merch-soon__title">' + esc(t.title || '') + '</div>' +
      '<div class="merch-soon__hint">' + esc(t.hint || '') + '</div>' +
    '</div>';
  }).join('');
  host.innerHTML = card + soon;
})();
</script>
