<!doctype html>
<html lang="ru" data-variant="paddock">
<head>
<meta charset="utf-8">
<title>Courses — Paddock — drift.eg.je</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css?v=brand3">
<link rel="stylesheet" href="paddock.css">
<link rel="stylesheet" href="../mobile-overrides.css?v=mobile5">
<style>
  .cs-lede {
    color: rgba(255,255,255,0.78); font-size:15px; line-height:1.6; max-width:60ch;
    margin-top:18px;
  }

  .cs-grid { display:grid; grid-template-columns:1fr; gap:20px; margin-top:32px; }
  @media (min-width: 700px) { .cs-grid { grid-template-columns: repeat(3, 1fr); } }

  .cs-card {
    background:#0f0f10; border:1px solid #2a2a2c;
    display:flex; flex-direction:column; position:relative; overflow:hidden;
  }
  .cs-card--featured { border-color: var(--accent); }
  .cs-card--featured::before {
    content:'CHOICE'; position:absolute; top:0; right:0;
    background: var(--accent); color: var(--accent-ink);
    padding:5px 10px; font-family:'JetBrains Mono', monospace;
    font-size:10px; letter-spacing:0.18em; font-weight:700;
  }

  .cs-card__head {
    padding:18px 22px 14px; border-bottom:1px dashed #2a2a2c;
    display:flex; flex-direction:column; gap:8px;
  }
  .cs-card__name {
    font-family: var(--font-display, 'Oswald', sans-serif);
    font-size:24px; letter-spacing:0.02em; text-transform:uppercase; color:#fff;
    line-height:1.05;
  }
  .cs-card__row {
    display:flex; gap:8px; flex-wrap:wrap; align-items:center;
  }
  .cs-card__lessons {
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.18em;
    color: rgba(255,255,255,0.55); text-transform:uppercase;
  }
  .cs-card__level {
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.18em;
    background:#3a1d0c; color: var(--accent); border:1px solid var(--accent);
    padding:3px 8px; text-transform:uppercase;
  }

  .cs-card__list {
    list-style:none; margin:0; padding:14px 22px 16px; flex:1;
    display:flex; flex-direction:column; gap:8px;
  }
  .cs-card__list li {
    display:grid; grid-template-columns: 12px 1fr; gap:10px;
    color: rgba(255,255,255,0.85); font-size:13px; line-height:1.5;
  }
  .cs-card__list li::before {
    content:''; display:block; width:8px; height:8px;
    background: var(--accent); margin-top:7px;
  }

  .cs-card__access {
    padding:10px 22px;
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.18em;
    color: rgba(255,255,255,0.55); text-transform:uppercase;
    border-top:1px dashed #2a2a2c;
  }
  .cs-card__access strong { color:#fff; font-weight:600; }

  .cs-card__foot {
    padding:14px 22px 18px; border-top:1px solid #2a2a2c;
    display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap;
  }
  .cs-card__price {
    font-family:'Bebas Neue', sans-serif; font-size:38px; line-height:1;
    color:#fff; letter-spacing:0.02em;
  }
  .cs-card__price small {
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.18em;
    color: rgba(255,255,255,0.55); margin-left:6px; vertical-align:6px;
  }

  .cs-teaser {
    margin-top:42px; background:#0f0f10; border:1px solid #2a2a2c; padding:24px;
    display:grid; grid-template-columns: 1fr; gap:20px; align-items:center;
  }
  @media (min-width: 800px) {
    .cs-teaser { grid-template-columns: 1.4fr 1fr; }
  }
  .cs-teaser__title {
    font-family: var(--font-display, 'Oswald', sans-serif);
    font-size:clamp(22px, 3vw, 32px); letter-spacing:0.02em;
    text-transform:uppercase; color:#fff; margin:0 0 8px;
    line-height:1.05;
  }
  .cs-teaser__title em { color: var(--accent); font-style:normal; }
  .cs-teaser__copy {
    color: rgba(255,255,255,0.78); font-size:14px; line-height:1.55; margin:0;
  }
  .cs-teaser__form {
    display:flex; gap:12px; flex-wrap:wrap;
  }
  .cs-teaser__form input {
    flex:1 1 200px; min-width:0;
    background:#1a1a1c; border:1px solid #2a2a2c; padding:12px 14px;
    color:#fff; font-family:'Manrope', system-ui, sans-serif; font-size:14px;
    border-radius:0; transition:border-color .15s;
  }
  .cs-teaser__form input:focus { outline:none; border-color: var(--accent); }
</style>
</head>
<body class="pad-body">

<div class="pad-strip"></div>

<header class="topbar">
  <div class="topbar__inner">
    <a class="brand brand--stack" href="../index.html" aria-label="Dark Force">
      <svg class="monster-head" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M4 4 L14 10 L24 4 L22 16 L26 22 L14 26 L2 22 L6 16 Z" fill="var(--accent)" stroke="none"/>
      </svg>
      <span class="brand__wordmark">DARK <b>FORCE</b></span>
    </a>
    <nav class="nav">
      <a href="home.html">Home</a>
      <a href="team.html">Team</a>
      <a href="drivers.html">Drivers</a>
      <a href="calendar.html">Calendar</a>
      <a href="tracks.html">Tracks</a>
      <a href="gallery.html">Gallery</a>
      <a href="shop.html">Shop</a>
      <a href="merch.html">Merch</a>
      <a href="sponsors.html">Sponsors</a>
      <a href="coaching.html">Coaching</a>
      <a href="tickets.html" class="soon" title="Раздел временно неактивен — вернёмся позже">Tickets</a>
      <a href="prints.html">Prints</a>
      <a href="inner-circle.html">Inner</a>
      <a class="active" href="courses.html">Courses</a>
    </nav>
    <div class="topbar__right">
      <a class="btn btn--primary" href="#cs-teaser">Пробный урок</a>
    </div>
  </div>
</header>

<section class="pad-section">
  <div class="pad-section__head">
    <span class="num">15</span>
    <h2>Courses</h2>
    <span class="meta">VIDEO COURSES<br>BY DARK FORCE</span>
  </div>

  <p class="cs-lede" id="cs-lede"></p>

  <div class="cs-grid" id="cs-grid"></div>

  <div id="cs-teaser" class="cs-teaser">
    <div>
      <h2 class="cs-teaser__title" id="cs-teaser-title"></h2>
      <p class="cs-teaser__copy" id="cs-teaser-copy"></p>
    </div>
    <form class="cs-teaser__form" id="cs-teaser-form" method="POST" action="mailto:darkforcedrift@gmail.com?subject=Пробный%20урок%20Dark%20Force" enctype="text/plain">
      <input type="email" name="email" required placeholder="Твой email">
      <button type="submit" class="btn btn--primary">Получить →</button>
    </form>
  </div>

</section>

<footer class="pad-footer">
  <div class="pad-footer__mono">
    <span>© 2026 DRIFT.EG.JE</span>
    <span>Paddock variant · courses</span>
  </div>
</footer>

<script>
window.DRIFT_TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "orange",
  "density": "comfy",
  "motion": true,
  "hero": "video",
  "lang": "ru"
}/*EDITMODE-END*/;
</script>
<script src="../drift-data.js"></script>
<script src="../shared.js"></script>
<script>
(function () {
  function esc(s) { return String(s == null ? '' : s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])); }
  function enc(s) { return encodeURIComponent(String(s == null ? '' : s)); }
  var data = window.DRIFT_DATA || {};
  var CS = data.courses || {};
  var email = CS.contactEmail || 'darkforcedrift@gmail.com';

  var ledeEl = document.getElementById('cs-lede');
  if (ledeEl) ledeEl.textContent = CS.lede || 'Курсы дрифта от Dark Force.';

  var grid = document.getElementById('cs-grid');
  if (grid) {
    grid.innerHTML = (CS.courses || []).map(function (c) {
      var subj = enc('Курс · ' + (c.name || ''));
      var body = enc('Хочу купить курс "' + (c.name || '') + '" (' + (c.price || '') + ').\nИмя: \nEmail: \nTelegram: ');
      return '<article class="cs-card' + (c.featured ? ' cs-card--featured' : '') + '">' +
        '<div class="cs-card__head">' +
          '<div class="cs-card__name">' + esc(c.name || '') + '</div>' +
          '<div class="cs-card__row">' +
            (c.lessons ? '<span class="cs-card__lessons">' + esc(c.lessons) + '</span>' : '') +
            (c.level ? '<span class="cs-card__level">' + esc(c.level) + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<ul class="cs-card__list">' +
          (c.bullets || []).map(function (b) { return '<li>' + esc(b) + '</li>'; }).join('') +
        '</ul>' +
        (c.access ? '<div class="cs-card__access">Доступ: <strong>' + esc(c.access) + '</strong></div>' : '') +
        '<div class="cs-card__foot">' +
          '<div class="cs-card__price">' + esc(c.price || '') + (c.priceUnit ? '<small>' + esc(c.priceUnit) + '</small>' : '') + '</div>' +
          '<a class="btn ' + (c.featured ? 'btn--primary' : 'btn--secondary') + '" href="mailto:' + esc(email) + '?subject=' + subj + '&body=' + body + '">Купить →</a>' +
        '</div>' +
      '</article>';
    }).join('');
  }

  var teaserTitleEl = document.getElementById('cs-teaser-title');
  if (teaserTitleEl) {
    var t = CS.teaserTitle || 'Бесплатный пробный урок';
    var accent = CS.teaserAccent || '';
    if (accent && t.indexOf(accent) !== -1) {
      teaserTitleEl.innerHTML = esc(t.replace(accent, '')).replace(/\s+$/, '') + ' <em>' + esc(accent) + '</em>';
    } else {
      teaserTitleEl.textContent = t;
    }
  }
  var teaserCopyEl = document.getElementById('cs-teaser-copy');
  if (teaserCopyEl) teaserCopyEl.textContent = CS.teaserCopy || '';

  var formEl = document.getElementById('cs-teaser-form');
  if (formEl) {
    var url = formEl.getAttribute('action') || '';
    formEl.setAttribute('action', url.replace(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/, email));
  }
})();
</script>
</body>
</html>
